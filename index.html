<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gebetszeiten 2026</title>
<style>
    body {
        text-align: center;
        font-family: Arial, sans-serif;
        background-color: #eaf2f8; /* sanftes Moschee-Blau */
        margin: 0;
        padding: 0;
        color: #000;
    }

    header {
        background-color: #006699; /* dunkleres Blau für Header */
        padding: 20px 0;
        color: white;
        font-size: 28px;
        font-weight: bold;
        border-bottom-left-radius: 30px;
        border-bottom-right-radius: 30px;
    }

    header img {
        height: 50px;
        vertical-align: middle;
        margin-right: 10px;
    }

    h1 {
        margin: 10px 0 0 0;
    }

    iframe {
        width: 90%;
        max-width: 600px;
        height: 400px;
        border: 3px solid #006699;
        border-radius: 20px;
        margin: 20px auto;
        display: block;
    }

    .button {
        display: block;
        width: 80%;
        max-width: 400px;
        margin: 15px auto;
        padding: 20px;
        font-size: 22px;
        color: white;
        background-color: #0099cc; /* heller Blauton */
        border-radius: 25px;
        text-decoration: none;
        font-weight: bold;
        box-shadow: 2px 4px 6px rgba(0,0,0,0.2);
    }

    .info {
        margin: 20px auto;
        background: #ffffff;
        width: 90%;
        max-width: 600px;
        padding: 15px;
        border-radius: 20px;
        font-size: 18px;
        line-height: 1.6;
        text-align: left;
    }

    .info p {
        margin: 10px 0;
    }

    .language {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .language img {
        width: 30px;
        height: 30px;
    }

    @media (max-width: 600px) {
        iframe { height: 300px; }
        .button { font-size: 20px; padding: 15px; }
        .info { font-size: 16px; }
        header { font-size: 24px; }
    }
</style>
</head>
<body>

<header>
    <img src="https://cdn-icons-png.flaticon.com/512/125/125694.png" alt="Moschee-Icon">
    Gebetszeiten 2026
</header>

<iframe src="Gebetszeiten_2026.pdf"></iframe>

<a class="button" href="Gebetszeiten_2026.pdf" download>⬇️ PDF Download</a>

<div class="info">

<!-- Arabisch -->
<p class="language" dir="rtl">
<img src="https://cdn-icons-png.flaticon.com/512/197/197386.png" alt="Arabisch">
<b>العربية:</b><br>
اضغط على "PDF Download"، سيتم حفظ الملف في مجلد التنزيلات
</p>

<!-- Deutsch -->
<p class="language">
<img src="https://cdn-icons-png.flaticon.com/512/197/197375.png" alt="Deutsch">
<b>Deutsch:</b><br>
Klicken Sie auf „PDF Download“, Die Datei wird im Ordner „Downloads“ gespeichert.
</p>

<!-- English -->
<p class="language">
<img src="https://cdn-icons-png.flaticon.com/512/197/197374.png" alt="English">
<b>English:</b><br>
Click “PDF Download”, The file will be saved in your “Downloads” folder.
</p>

</div>

</body>
</html>
